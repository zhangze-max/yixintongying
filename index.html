<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>一心通营远程操控系统</title>
<style>
:root{
  --bg:#f8fafc; --surface:#fff; --raised:#f1f5f9; --border:#e2e8f0;
  --t1:#0f172a; --t2:#475569; --t3:#94a3b8;
  --blue:#2563eb; --blue-l:#eff6ff; --teal:#0d9488; --teal-l:#f0fdfa;
  --green:#16a34a; --green-l:#f0fdf4; --amber:#d97706; --amber-l:#fffbeb; --red:#dc2626; --red-l:#fef2f2;
  --gold:#b8860b; --silver:#6b7280; --bronze:#b45309;
  --r:6px; --r-lg:10px; --sh:0 1px 3px rgba(0,0,0,.06); --sh-md:0 4px 12px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow-y:auto}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;min-height:100%;overflow-y:auto}
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;background:var(--blue);border-radius:50%}
.brand span{color:var(--t2);font-weight:400;font-size:12px}
.actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border:none;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:.15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-o{background:var(--surface);border:1px solid var(--border);color:var(--t2)}.btn-o:hover{border-color:var(--blue);color:var(--blue)}
.btn-o:disabled{opacity:.5;cursor:not-allowed}
.timestamp{font-size:11px;color:var(--t3);margin-right:8px}
.status{font-size:11px;padding:2px 8px;border-radius:8px;margin-right:8px}
.status.ok{background:var(--green-l);color:var(--green)}
.status.err{background:var(--red-l);color:var(--red)}
.status.loading{background:var(--blue-l);color:var(--blue)}
/* Leaderboard */
.lb-wrap{max-width:1200px;margin:20px auto 0;padding:0 24px}
.lb-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--t1)}
.lb{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;text-align:center;transition:.15s;position:relative}
.lb-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.lb-card.gold{border-color:#fbbf24;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.lb-card.silver{border-color:#d1d5db;background:linear-gradient(135deg,#f9fafb,#f3f4f6)}
.lb-card.bronze{border-color:#fdba74;background:linear-gradient(135deg,#fff7ed,#ffedd5)}
.lb-rank{font-size:20px;font-weight:800}
.lb-name{font-size:13px;font-weight:600;margin:4px 0}
.lb-score{font-size:22px;font-weight:800;font-family:monospace}
.lb-detail{font-size:10px;color:var(--t3);margin-top:2px}
.lb-card.idle{opacity:.6}
.medal{font-size:24px;position:absolute;top:-8px;right:-4px}
.period-tabs{float:right;display:flex;gap:4px}
.ptab{padding:3px 12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);font-size:11px;cursor:pointer;color:var(--t2);transition:.15s}
.ptab:hover{border-color:var(--blue)}
.ptab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.delta{font-size:10px;margin-left:4px}
.delta.up{color:var(--green)}.delta.down{color:var(--red)}.delta.zero{color:var(--t3)}
/* Content */
.content{max-width:1200px;margin:16px auto 30px;padding:0 24px}
/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.tab{padding:8px 18px;border:none;background:none;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:.15s;position:relative;top:2px}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--blue);font-weight:600;border-bottom:2px solid var(--blue)}
.tab .cnt{font-size:10px;color:var(--t3);margin-left:4px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.stat .label{font-size:11px;color:var(--t3)}.stat .val{font-size:24px;font-weight:800;font-family:monospace;margin-top:2px}
.stat.blue .val{color:var(--blue)}.stat.red .val{color:var(--red)}.stat.amber .val{color:var(--amber)}.stat.green .val{color:var(--green)}
/* Panels */
.panel{display:none}.panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.tbl-wrap{overflow-x:auto;overflow-y:visible;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh);max-height:70vh;overflow-y:auto}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.tbl-wrap th{position:sticky;top:0;background:var(--raised);padding:8px 10px;text-align:left;font-weight:600;color:var(--t2);border-bottom:2px solid var(--border);white-space:nowrap;font-size:11px;z-index:1}
.tbl-wrap td{padding:6px 10px;border-bottom:1px solid var(--border-l, #f1f5f9);color:var(--t1);max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl-wrap tr:hover td{background:var(--blue-l)}
.tbl-wrap .num{text-align:center;width:44px}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.badge-r{background:var(--red-l);color:var(--red)}.badge-g{background:var(--green-l);color:var(--green)}
.badge-a{background:var(--amber-l);color:var(--amber)}.badge-b{background:var(--blue-l);color:var(--blue)}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.footer{text-align:center;padding:20px;color:var(--t3);font-size:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="dot"></div>一心通营远程操控系统<span>v2 · 三张表</span></div>
  <div class="actions">
    <span class="status" id="syncStatus"></span>
    <span class="timestamp" id="ts">--</span>
    <button class="btn btn-o" id="refreshBtn" onclick="refreshData()">🔄 同步数据</button>
    <button class="btn btn-p" onclick="window.open('https://g0v8bkvkldw.feishu.cn/wiki/PZJLw8SF5igYbEkAba6cq3CznMh','_blank')">📋 三张表</button>
  </div>
</div>

<div class="lb-wrap">
  <div class="lb-title">
    🏆 积分榜
    <span class="period-tabs">
      <button class="ptab active" onclick="switchPeriod('total',this)">总排名</button>
      <button class="ptab" onclick="switchPeriod('日',this)">日排名</button>
      <button class="ptab" onclick="switchPeriod('周',this)">周排名</button>
      <button class="ptab" onclick="switchPeriod('月',this)">月排名</button>
      <select class="ptab" id="historyDate" onchange="showHistory(this.value)" style="display:none">
        <option value="">📅 历史</option>
      </select>
    </span>
  </div>
  <div class="lb" id="lb"></div>
</div>

<div class="content">
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="footer">数据源：飞书云文档「三张表」 · <span id="src"></span> · 双击打开即用</div>

<script src="data.js"></script>
<script>
(function(){
var d = DATA;
window.DATA = d;
var currentPeriod = 'total';
document.getElementById('ts').textContent = '同步时间：' + d.timestamp;
document.getElementById('src').textContent = d.source;
document.getElementById('syncStatus').textContent = '✅';
document.getElementById('syncStatus').className = 'status ok';

function renderLeaderboard(period){
  var lb = document.getElementById('lb');
  lb.innerHTML = '';
  var raw = d.sheets['积分表'].data.slice();
  var deltas = (d.deltas && d.deltas[period]) || {};
  
  var ranked;
  if (period === 'total') {
    ranked = raw.map(function(r){ return {name:r[0], score:parseInt(r[4])||0, delta:null}; });
  } else {
    ranked = [];
    raw.forEach(function(r){
      var name = r[0], score = parseInt(r[4])||0;
      if (!name) return;
      var delta = deltas[name] !== undefined ? deltas[name] : null;
      if (delta !== null) ranked.push({name:name, score:delta, delta:delta});
    });
    // No historical data yet → show baseline message
    if (ranked.length === 0) {
      var labels = {日:'暂无昨日数据，明日8:15后开始对比', 周:'暂无上周数据', 月:'暂无上月数据'};
      lb.innerHTML = '<div style=\"text-align:center;padding:30px;color:var(--t3);font-size:13px\">📊 '+(labels[period]||'暂无对比数据')+'<br><span style=\"font-size:11px\">当前总排名如下</span></div>';
      renderLeaderboard('total');
      return;
    }
  }
  ranked.sort(function(a,b){ return b.score - a.score; });
  
  var medals = ['🥇','🥈','🥉'];
  ranked.forEach(function(p, i){
    if (!p.name) return;
    var cls = i===0?'gold':i===1?'silver':i===2?'bronze':'idle';
    var m = i<3 ? '<div class="medal">'+medals[i]+'</div>' : '';
    var deltaHtml = '';
    if (p.delta !== null && period !== 'total') {
      var dc = p.delta > 0 ? 'up' : p.delta < 0 ? 'down' : 'zero';
      var ds = p.delta > 0 ? '+'+p.delta : String(p.delta);
      deltaHtml = '<span class="delta '+dc+'">'+ds+'</span>';
    }
    // Get detail scores for total period
    var detail = '';
    if (period === 'total') {
      var rr = raw.find(function(x){ return x[0] === p.name; });
      if (rr) detail = '<div class="lb-detail">差距'+rr[1]+' | 异常'+rr[2]+' | 自评'+rr[3]+'</div>';
    }
    lb.innerHTML += '<div class="lb-card '+cls+'\">'+m+
      '<div class="lb-rank" style=\"color:'+(i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--t3)')+'\">#'+(i+1)+'</div>'+
      '<div class="lb-name">'+p.name+deltaHtml+'</div>'+
      '<div class="lb-score">'+p.score+'</div>'+detail+
      '</div>';
  });
}

renderLeaderboard('total');

// Populate history date selector
var hist = d.history || [];
var hsel = document.getElementById('historyDate');
if (hist.length > 1) {
  hsel.style.display = '';
  hist.forEach(function(h){
    hsel.innerHTML += '<option value="'+h.date+'">'+h.date+'</option>';
  });
}

function switchPeriod(p, el){
  currentPeriod = p;
  document.querySelectorAll('.ptab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('historyDate').value = '';
  renderLeaderboard(p);
}

function showHistory(dateStr){
  if (!dateStr) return;
  document.querySelectorAll('.ptab').forEach(function(t){ t.classList.remove('active'); });
  var h = (d.history||[]).find(function(x){ return x.date === dateStr; });
  if (!h) return;
  
  var lb = document.getElementById('lb');
  lb.innerHTML = '<div style="text-align:center;padding:8px;font-size:12px;color:var(--blue);font-weight:600">📅 历史排名 · '+dateStr+'</div>';
  
  // Find previous date for delta
  var idx = hist.findIndex(function(x){ return x.date === dateStr; });
  var prev = idx > 0 ? hist[idx-1].scores : {};
  
  var ranked = [];
  Object.keys(h.scores).forEach(function(name){
    var delta = prev[name] !== undefined ? h.scores[name] - prev[name] : null;
    ranked.push({name:name, score:h.scores[name], delta:delta});
  });
  ranked.sort(function(a,b){ return b.score - a.score; });
  
  var medals = ['🥇','🥈','🥉'];
  ranked.forEach(function(p, i){
    var cls = i===0?'gold':i===1?'silver':i===2?'bronze':'idle';
    var m = i<3 ? '<div class="medal">'+medals[i]+'</div>' : '';
    var dh = '';
    if (p.delta !== null) {
      var dc = p.delta > 0 ? 'up' : p.delta < 0 ? 'down' : 'zero';
      dh = '<span class="delta '+dc+'">'+(p.delta>0?'+':'')+p.delta+'</span>';
    }
    lb.innerHTML += '<div class="lb-card '+cls+'">'+m+
      '<div class="lb-rank">#'+(i+1)+'</div>'+
      '<div class="lb-name">'+p.name+dh+'</div>'+
      '<div class="lb-score">'+p.score+'</div>'+
      '</div>';
  });
}
window.switchPeriod = switchPeriod;

// Stats
var sheets = d.sheets;
var stats = [
  {label:'自评表条目', val:sheets['自评表'].count, cls:'blue'},
  {label:'差距表条目', val:sheets['差距表'].count, cls:'amber'},
  {label:'异常表条目', val:sheets['异常表'].count, cls:'red'},
  {label:'积分人数', val:d.personnel.length, cls:'green'},
];
var st = document.getElementById('stats');
stats.forEach(function(s){
  st.innerHTML += '<div class="stat '+s.cls+'"><div class="label">'+s.label+'</div><div class="val">'+s.val+'</div></div>';
});

// Tabs & panels
var tabs = [
  {id:'zcb', label:'自评表', sheet:'自评表'},
  {id:'cjb', label:'差距表', sheet:'差距表'},
  {id:'ycb', label:'异常表', sheet:'异常表'},
  {id:'bbqd', label:'报表清单', sheet:'报表清单'},
  {id:'jfb', label:'积分表', sheet:'积分表'},
];
var tw = document.getElementById('tabs');
var pw = document.getElementById('panels');

tabs.forEach(function(t, i){
  var s = sheets[t.sheet];
  tw.innerHTML += '<button class="tab'+(i===0?' active':'')+'" onclick="switchTab(\''+t.id+'\', this)">'+t.label+'<span class="cnt">'+s.count+'</span></button>';

  var h = '<div class="panel'+(i===0?' active':'')+'" id="p-'+t.id+'">';
  if (s.data.length === 0) {
    h += '<div class="empty">暂无数据</div>';
  } else {
    h += '<div class="tbl-wrap"><table><thead><tr>';
    s.headers.forEach(function(hh){ h += '<th>'+hh+'</th>'; });
    h += '</tr></thead><tbody>';
    s.data.forEach(function(row){
      h += '<tr>';
      row.forEach(function(cell, ci){
        var v = cell.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        h += '<td'+(ci===0?' class="num"':'')+'>'+v+'</td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';
  pw.innerHTML += h;
});
})();

function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('p-'+id).classList.add('active');
}

function refreshData(){
  var btn = document.getElementById('refreshBtn');
  var status = document.getElementById('syncStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 刷新中...';
  status.textContent = '⏳';
  status.className = 'status loading';

  // Cron updates data.js every 10min. Just reload with cache bust.
  fetch('http://localhost:8899/sync', {method: 'POST'}).catch(function(){});
  
  var oldScript = document.querySelector('script[src^="data.js"]');
  if (oldScript) oldScript.remove();
  var script = document.createElement('script');
  script.src = 'data.js?v=' + Date.now();
  script.onload = function(){
    var d = window.DATA;
    if (d && d.sheets) {
      document.getElementById('ts').textContent = '同步时间：' + d.timestamp;
      rebuildPage(d);
      status.textContent = '✅';
      status.className = 'status ok';
    } else {
      status.textContent = '⚠️';
      status.className = 'status err';
    }
    btn.disabled = false;
    btn.textContent = '🔄 刷新数据';
  };
  script.onerror = function(){
    status.textContent = '❌';
    status.className = 'status err';
    btn.disabled = false;
    btn.textContent = '🔄 重试';
  };
  document.head.appendChild(script);
}

function rebuildPage(d){
  // Leaderboard
  var lb = document.getElementById('lb');
  lb.innerHTML = '';
  var scores = d.sheets['积分表'].data.slice();
  scores.sort(function(a,b){ return parseInt(b[4]) - parseInt(a[4]); });
  var medals = ['🥇','🥈','🥉'];
  scores.forEach(function(row, i){
    var cls = i===0?'gold':i===1?'silver':i===2?'bronze':'idle';
    var m = i<3 ? '<div class="medal">'+medals[i]+'</div>' : '';
    lb.innerHTML += '<div class="lb-card '+cls+'">'+m+
      '<div class="lb-rank" style="color:'+(i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--t3)')+'">#'+(i+1)+'</div>'+
      '<div class="lb-name">'+row[0]+'</div>'+
      '<div class="lb-score">'+row[4]+'</div>'+
      '<div class="lb-detail">差距'+row[1]+' | 异常'+row[2]+' | 自评'+row[3]+'</div>'+
      '</div>';
  });
}
</script>
</body>
</html>
